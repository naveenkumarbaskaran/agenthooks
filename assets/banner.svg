<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 340" width="1200" height="340">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020818"/>
      <stop offset="50%" style="stop-color:#050d2a"/>
      <stop offset="100%" style="stop-color:#0a0520"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="35%" style="stop-color:#818cf8"/>
      <stop offset="65%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="hookLineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#020818;stop-opacity:0"/>
      <stop offset="15%" style="stop-color:#22d3ee;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#818cf8;stop-opacity:1"/>
      <stop offset="85%" style="stop-color:#c084fc;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#020818;stop-opacity:0"/>
    </linearGradient>
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPurple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="stars" x="0" y="0" width="120" height="80" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="15" r="0.8" fill="#ffffff" opacity="0.4"/>
      <circle cx="45" cy="5" r="0.6" fill="#ffffff" opacity="0.3"/>
      <circle cx="80" cy="30" r="1" fill="#ffffff" opacity="0.5"/>
      <circle cx="110" cy="12" r="0.7" fill="#ffffff" opacity="0.35"/>
      <circle cx="25" cy="55" r="0.9" fill="#ffffff" opacity="0.3"/>
      <circle cx="65" cy="65" r="0.6" fill="#ffffff" opacity="0.4"/>
      <circle cx="95" cy="70" r="0.8" fill="#ffffff" opacity="0.25"/>
      <circle cx="5" cy="72" r="0.5" fill="#22d3ee" opacity="0.6"/>
      <circle cx="55" cy="40" r="0.5" fill="#818cf8" opacity="0.5"/>
      <circle cx="100" cy="45" r="0.6" fill="#c084fc" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" fill="url(#bgGrad)"/>
  <rect width="1200" height="340" fill="url(#stars)" opacity="0.8"/>

  <!-- Hook pipeline lines - left side -->
  <line x1="0" y1="170" x2="340" y2="170" stroke="url(#hookLineGrad)" stroke-width="1.5" opacity="0.4"/>
  <!-- Hook pipeline lines - right side -->
  <line x1="860" y1="170" x2="1200" y2="170" stroke="url(#hookLineGrad)" stroke-width="1.5" opacity="0.4"/>

  <!-- Hook nodes - left cluster -->
  <circle cx="80" cy="170" r="6" fill="#22d3ee" opacity="0.7" filter="url(#glowCyan)"/>
  <circle cx="160" cy="170" r="5" fill="#818cf8" opacity="0.6" filter="url(#softGlow)"/>
  <circle cx="240" cy="170" r="6" fill="#c084fc" opacity="0.7" filter="url(#glowPurple)"/>
  <circle cx="300" cy="170" r="4" fill="#22d3ee" opacity="0.5"/>

  <!-- Hook nodes - right cluster -->
  <circle cx="900" cy="170" r="4" fill="#22d3ee" opacity="0.5"/>
  <circle cx="960" cy="170" r="6" fill="#c084fc" opacity="0.7" filter="url(#glowPurple)"/>
  <circle cx="1040" cy="170" r="5" fill="#818cf8" opacity="0.6" filter="url(#softGlow)"/>
  <circle cx="1120" cy="170" r="6" fill="#22d3ee" opacity="0.7" filter="url(#glowCyan)"/>

  <!-- Vertical hook drop lines -->
  <line x1="80" y1="170" x2="80" y2="200" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
  <line x1="160" y1="170" x2="160" y2="195" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
  <line x1="240" y1="170" x2="240" y2="205" stroke="#c084fc" stroke-width="1" opacity="0.5"/>
  <line x1="960" y1="170" x2="960" y2="205" stroke="#c084fc" stroke-width="1" opacity="0.5"/>
  <line x1="1040" y1="170" x2="1040" y2="195" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
  <line x1="1120" y1="170" x2="1120" y2="200" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>

  <!-- Hook labels -->
  <text x="80" y="218" text-anchor="middle" font-family="monospace" font-size="9" fill="#22d3ee" opacity="0.7">before_call</text>
  <text x="160" y="213" text-anchor="middle" font-family="monospace" font-size="9" fill="#818cf8" opacity="0.6">enrich</text>
  <text x="240" y="223" text-anchor="middle" font-family="monospace" font-size="9" fill="#c084fc" opacity="0.7">validate</text>
  <text x="960" y="223" text-anchor="middle" font-family="monospace" font-size="9" fill="#c084fc" opacity="0.7">audit</text>
  <text x="1040" y="213" text-anchor="middle" font-family="monospace" font-size="9" fill="#818cf8" opacity="0.6">after_call</text>
  <text x="1120" y="218" text-anchor="middle" font-family="monospace" font-size="9" fill="#22d3ee" opacity="0.7">observe</text>

  <!-- Central agent box -->
  <rect x="360" y="120" width="480" height="100" rx="12" fill="#050d2a" stroke="#22d3ee" stroke-width="1.5" opacity="0.9"/>
  <rect x="360" y="120" width="480" height="100" rx="12" fill="none" stroke="#818cf8" stroke-width="0.5" opacity="0.4"/>

  <!-- Main title -->
  <text x="600" y="158" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="42" font-weight="700" fill="url(#titleGrad)" filter="url(#textGlow)">agenthooks</text>

  <!-- Subtitle -->
  <text x="600" y="185" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#818cf8" opacity="0.9" letter-spacing="2">Hook any production agent. Ship extensibility.</text>

  <!-- Bottom tagline -->
  <text x="600" y="270" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#22d3ee" opacity="0.65" letter-spacing="1">OTel · Zero-dep core · Sequential &amp; Parallel · Timeout-safe · Audit trail</text>

  <!-- Corner decorations -->
  <rect x="15" y="15" width="30" height="2" fill="#22d3ee" opacity="0.4"/>
  <rect x="15" y="15" width="2" height="30" fill="#22d3ee" opacity="0.4"/>
  <rect x="1155" y="15" width="30" height="2" fill="#c084fc" opacity="0.4"/>
  <rect x="1183" y="15" width="2" height="30" fill="#c084fc" opacity="0.4"/>
  <rect x="15" y="323" width="30" height="2" fill="#818cf8" opacity="0.4"/>
  <rect x="15" y="293" width="2" height="30" fill="#818cf8" opacity="0.4"/>
  <rect x="1155" y="323" width="30" height="2" fill="#22d3ee" opacity="0.4"/>
  <rect x="1183" y="293" width="2" height="30" fill="#22d3ee" opacity="0.4"/>
</svg>
